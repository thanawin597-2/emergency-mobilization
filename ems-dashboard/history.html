<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Log — EMS</title>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f7fb;
    }
    .container {
      max-width: 1400px;
    }
    
    /* สไตล์แถบเมนูด้านบน (Top Navbar) */
    .top-navbar {
      background: white;
      padding: 20px 28px;
      border-radius: 20px;
      margin-bottom: 28px;
      border: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .navbar-brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .navbar-logo {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .navbar-title {
      font-size: 18px;
      font-weight: 700;
    }
    .navbar-subtitle {
      font-size: 13px;
      color: #64748b;
    }

    /* สไตล์แถวแสดงบัตรสรุป (Summary Section) และแถวตัวกรอง (Filter Section) */
    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .filter-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    /* สไตล์ปุ่มตัวกรองสถานะ/เวลา */
    .filter-btn {
      border: 1px solid #dbe2ea;
      background: white;
      color: #475569;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
    }
    .filter-btn:hover {
      background: #f8fafc;
    }
    .filter-btn.active {
      background: #0f172a;
      color: white;
      border-color: #0f172a;
    }

    /* สไตล์การ์ดสรุปภาพรวม (Summary Card) */
    .summary-card {
      background: white;
      padding: 24px;
      border-radius: 18px;
      min-width: 200px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .summary-card.success {
      background: linear-gradient(135deg, #ecfdf5, #dcfce7);
      border: 1px solid #bbf7d0;
    }
    .summary-card .label {
      font-size: 13px;
      color: #64748b;
    }
    .summary-card .value {
      font-size: 28px;
      font-weight: 700;
    }

    /* สไตล์หลักของการ์ดประวัติเหตุการณ์ (History Card) */
    .history-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 12px rgba(0,0,0,.05);
      transition: .25s;
    }
    .history-card:hover {
      transform: translateY(-3px);
      border-color: #cbd5e1;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .history-date {
      font-size: 16px;
      font-weight: 700;
    }
    .history-id {
      font-size: 12px;
      color: #64748b;
    }
    .history-badge {
      background: #dcfce7;
      color: #15803d;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      min-width: 90px;
      text-align: center;
    }
    .history-info {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
    }
    .history-info div {
      display: flex;
      flex-direction: column;
    }
    .history-info strong {
      font-size: 12px;
      color: #64748b;
    }
    .history-info span {
      font-size: 24px;
      font-weight: 700;
    }
    .history-body {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    /* กล่องสรุปอัตราการตอบรับ (Response Box) ด้านขวาของการ์ด */
    .response-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .response-box strong {
      color: #64748b;
      font-size: 12px;
    }
    .response-box span {
      font-size: 32px;
      font-weight: 700;
      color: #16a34a;
    }

    /* ─── สไตล์เพิ่มเติม: ตกแต่งให้เป็นทางการและสวยงามขึ้น ─── */
    /* ป้ายชื่อส่วนหัวข้อหลัก */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 12px;
      padding-left: 2px;
    }
    
    /* สไตล์ข้อความภายในการ์ดสรุป */
    .summary-card .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .summary-card .sub-label {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* สไตล์เส้นขอบด้านซ้ายของการ์ด เพื่อระบุความสำเร็จของเหตุการณ์ */
    .history-card {
      border-left: 4px solid #e2e8f0;
      padding-left: 22px;
    }
    .history-card.status-complete {
      border-left-color: #16a34a;
    }
    .history-card.status-incomplete {
      border-left-color: #f59e0b;
    }

    /* ชิปแสดงรหัสหมายเลขเหตุการณ์ (Event ID) */
    .event-id-pill {
      display: inline-block;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      color: #64748b;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* แถบกราฟความคืบหน้า (Progress Bar) แสดงสัดส่วนการตอบรับ */
    .rate-bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .rate-bar {
      width: 120px;
      height: 5px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }
    .rate-fill {
      height: 100%;
      border-radius: 999px;
      background: #16a34a;
      transition: width .4s ease;
    }
    .rate-fill.warn {
      background: #f59e0b;
    }
    .rate-fill.crit {
      background: #ef4444;
    }

    /* ปุ่มเปิดดูรายละเอียดเพิ่มเติมในแต่ละเหตุการณ์ */
    .history-card .btn-primary {
      background: #0f172a;
      border: 1px solid #0f172a;
      border-radius: 8px;
      padding: 7px 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .03em;
      color: white;
      transition: background .15s, box-shadow .15s;
      box-shadow: none;
    }
    .history-card .btn-primary:hover {
      background: #1e293b;
      border-color: #1e293b;
      box-shadow: 0 2px 8px rgba(15,23,42,.18);
    }
    .history-card .btn-primary:active {
      background: #0f172a;
      transform: scale(.98);
    }

    /* ส่วนท้ายของหน้าเว็บ (Footer) */
    .page-footer {
      text-align: center;
      font-size: 12px;
      color: #cbd5e1;
      padding: 24px 0 8px;
      letter-spacing: .04em;
    }
    .history-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>

  <div class="container mt-4" x-data="historyPage()" x-init="loadHistory()">

    <header class="top-navbar">
      <div class="navbar-brand-wrap">
        <div class="navbar-logo">
          EMS
        </div>
        <div>
          <div class="navbar-title">
            Emergency Mobilization System
          </div>
          <div class="navbar-subtitle">
            Mobilization History
          </div>
        </div>
      </div>
    </header>

    <div class="section-label">ภาพรวม</div>
    <div class="summary-row">

      <div class="summary-card">
        <div class="label">จำนวนเหตุการณ์ทั้งหมด</div>
        <div class="value" x-text="history.length"></div>
        <div class="sub-label">รายการในระบบ</div>
      </div>

      <div class="summary-card success">
        <div class="label">จำนวนตอบรับครบ</div>
        <div class="value" x-text="history.filter(e => e.officers.every(o => o.ack)).length"></div>
        </div>

      <div class="summary-card">
        <div class="label">จำนวนเจ้าหน้าที่ทั้งหมด</div>
        <div class="value">40</div>
        <div class="sub-label">เจ้าหน้าที่ในระบบ</div>
      </div>

    </div>

    <div class="section-label">รายการระดมพล</div>
    <div class="history-filters">
      <button class="filter-btn" :class="{ active: filter === 'all' }" @click="filter='all'">
        ทั้งหมด
      </button>
      <button class="filter-btn" :class="{ active: filter === 'today' }" @click="filter='today'">
        วันนี้
      </button>
      <button class="filter-btn" :class="{ active: filter === 'yesterday' }" @click="filter='yesterday'">
        เมื่อวาน
      </button>
      <button class="filter-btn" :class="{ active: filter === 'week' }" @click="filter='week'">
        7 วันล่าสุด
      </button>
    </div>

    <div x-show="history.length === 0" class="alert alert-secondary">
      ยังไม่มีประวัติการระดมพล
    </div>

    <template x-for="event in filteredHistory" :key="event.id">
      <div class="history-card" :class="{ 'status-complete': event.officers.every(o => o.ack), 'status-incomplete': !event.officers.every(o => o.ack) }">

        <div class="history-header">
          <div>
            <div class="history-date" x-text="formatDate(event.startedAt)"></div>
            <div class="history-id">
              Mobilization Event
              <span class="event-id-pill" x-text="'#' + event.id"></span>
            </div>
          </div>
          <span class="history-badge" :style="event.officers.every(o => o.ack) ? '' : 'background:#fef9c3;color:#92400e;border:1px solid #fde68a'">
            <span x-text="event.officers.filter(o => o.ack).length"></span>
            /
            <span x-text="event.targetCount"></span>
          </span>
        </div>

        <div class="history-body">
          <div class="history-info">
            <div>
              <strong>เป้าหมาย</strong>
              <span x-text="event.targetCount"></span>
            </div>
            <div>
              <strong>ตอบรับ</strong>
              <span x-text="event.officers.filter(o => o.ack).length"></span>
            </div>
            <div>
              <strong>เจ้าหน้าที่ทั้งหมด</strong>
              <span x-text="event.officers.length"></span>
            </div>
          </div>

          <div class="response-box">
            <strong>Response Rate</strong>
            <div class="rate-bar-wrap" style="margin-bottom:4px">
              <div class="rate-bar">
                <div class="rate-fill" 
                     :class="{ 'warn': Math.round((event.officers.filter(o=>o.ack).length / event.targetCount)*100) < 90 && Math.round((event.officers.filter(o=>o.ack).length / event.targetCount)*100) >= 70, 'crit': Math.round((event.officers.filter(o=>o.ack).length / event.targetCount)*100) < 70 }" 
                     :style="'width:' + Math.min(Math.round((event.officers.filter(o=>o.ack).length / event.targetCount)*100), 100) + '%'">
                </div>
              </div>
            </div>
            <span :style="Math.round((event.officers.filter(o=>o.ack).length / event.targetCount)*100) >= 90 ? 'color:#16a34a' : Math.round((event.officers.filter(o=>o.ack).length / event.targetCount)*100) >= 70 ? 'color:#d97706' : 'color:#dc2626'" 
                  x-text="Math.round((event.officers.filter(o=>o.ack).length / event.targetCount) * 100) + '%'">
            </span>
          </div>
        </div>

        <div style="margin-top:16px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;color:#94a3b8" 
                x-text="event.officers.every(o => o.ack) ? '✔ ตอบรับครบทุกนาย' : '⚠ ยังไม่ครบตามเป้าหมาย — ' + (event.targetCount - event.officers.filter(o=>o.ack).length) + ' นายยังไม่ตอบรับ'">
          </span>
          <button class="btn btn-primary btn-sm px-4" @click="openDetail(event.id)">
            ดูรายละเอียด →
          </button>
        </div>

      </div>
    </template>

    <div class="page-footer">
      Emergency Mobilization System &nbsp;·&nbsp; ข้อมูลอัปเดต Real-time
    </div>

  </div><script>
    function historyPage() {
      return {
        // ตัวแปรเก็บชุดข้อมูลประวัติทั้งหมดที่ดึงมาจาก Server API
        history: [],
        // ตัวแปรเก็บสถานะการเลือก Filter ปัจจุบัน
        filter: 'all',

        /**
         * ฟังก์ชันคำนวณและกรองข้อมูลประวัติ (Filtered List) ตามเงื่อนไขเวลาที่กำหนดไว้ปัจจุบัน
         */
        filteredHistory() {
          const now = new Date();
          return this.history.filter(event => {
            const eventDate = new Date(event.startedAt);
            
            if (this.filter === 'all')
              return true;

            // ตรวจสอบเงื่อนไขตัวกรอง: วันนี้
            if (this.filter === 'today') {
              return (
                eventDate.getDate() === now.getDate() &&
                eventDate.getMonth() === now.getMonth() &&
                eventDate.getFullYear() === now.getFullYear()
              );
            }

            // ตรวจสอบเงื่อนไขตัวกรอง: เมื่อวาน
            if (this.filter === 'yesterday') {
              const yesterday = new Date();
              yesterday.setDate(now.getDate() - 1);
              return (
                eventDate.getDate() === yesterday.getDate() &&
                eventDate.getMonth() === yesterday.getMonth() &&
                eventDate.getFullYear() === yesterday.getFullYear()
              );
            }

            // ตรวจสอบเงื่อนไขตัวกรอง: 7 วันล่าสุด
            if (this.filter === 'week') {
              const sevenDaysAgo = new Date();
              sevenDaysAgo.setDate(now.getDate() - 7);
              return eventDate >= sevenDaysAgo;
            }

            return true;
          });
        },

        /**
         * ฟังก์ชันเรียกโหลดดึงข้อมูลประวัติการระดมพลจากฝั่ง Back-end Server
         */
        async loadHistory() {
          const response = await fetch("http://localhost:3000/mobilization/history");
          this.history = await response.json();
        },

        /**
         * ฟังก์ชันจัดรูปแบบการแสดงผลวันที่และเวลา (Timestamp) ให้เป็นภาษาไทยตามรูปแบบสากลท้องถิ่น
         */
        formatDate(timestamp) {
          return new Date(timestamp).toLocaleString("th-TH");
        },

        /**
         * ฟังก์ชันนำทางผู้ใช้งานไปยังหน้าเว็บดูรายละเอียดแบบเจาะลึก (detail.html) โดยส่ง Query Parameter เป็น ID ไปด้วย
         */
        openDetail(id) {
          window.location.href = `detail.html?id=${id}`;
        }
      };
    }
  </script>

</body>
</html>
