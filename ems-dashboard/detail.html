<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดการระดมพล — EMS</title>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f7fb;
    }
    .container {
      max-width: 1400px;
    }

    /* ── Navbar (เหมือน history) ── */
    .top-navbar {
      background: white;
      padding: 20px 28px;
      border-radius: 20px;
      margin-bottom: 28px;
      border: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .navbar-brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .navbar-logo {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .navbar-title {
      font-size: 18px;
      font-weight: 700;
    }
    .navbar-subtitle {
      font-size: 13px;
      color: #64748b;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* ── Summary cards (เหมือน history) ── */
    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .summary-card {
      background: white;
      padding: 24px;
      border-radius: 18px;
      min-width: 200px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .summary-card.success {
      background: linear-gradient(135deg, #ecfdf5, #dcfce7);
      border: 1px solid #bbf7d0;
    }
    .summary-card.danger {
      background: linear-gradient(135deg, #fef2f2, #fee2e2);
      border: 1px solid #fecaca;
    }
    .summary-card .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .summary-card .value {
      font-size: 28px;
      font-weight: 700;
    }
    .summary-card.success .value {
      color: #16a34a;
    }
    .summary-card.danger .value {
      color: #dc2626;
    }
    .summary-card .sub-label {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* ── Officer table card ── */
    .officer-table-card {
      background: white;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .officer-table-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .officer-table-title {
      font-size: 15px;
      font-weight: 700;
    }
    .officer-filter-tabs {
      display: flex;
      gap: 8px;
    }
    .filter-tab {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: white;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: .15s;
    }
    .filter-tab.active {
      background: #0f172a;
      color: white;
      border-color: #0f172a;
    }
    .officer-table-inner {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: #f8fafc;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #94a3b8;
      padding: 12px 24px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: .15s;
    }
    tbody tr:last-child {
      border-bottom: none;
    }
    tbody tr:hover {
      background: #f8fafc;
    }
    tbody td {
      padding: 14px 24px;
      font-size: 14px;
      color: #0f172a;
      vertical-align: middle;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-pill.ack {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }
    .status-pill.noack {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    /* ── Loading / Error ── */
    .state-card {
      background: white;
      border-radius: 18px;
      padding: 48px 24px;
      text-align: center;
      border: 1px solid #e5e7eb;
      color: #94a3b8;
      font-size: 15px;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      font-size: 12px;
      color: #cbd5e1;
      padding: 24px 0 8px;
      letter-spacing: .04em;
    }
    .form-control {
      border: 1px solid #e2e8f0;
      box-shadow: none;
      transition: .2s;
    }
    .form-control:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15,23,42,.08);
    }
  </style>
</head>

<body>

  <div class="container mt-4" x-data="detailPage()" x-init="init()">

    <header class="top-navbar">
      <div class="navbar-brand-wrap">
        <div class="navbar-logo">EMS</div>
        <div>
          <div class="navbar-title">Emergency Mobilization System</div>
          <div class="navbar-subtitle">Mobilization Detail</div>
        </div>
      </div>
    </header>

    <div x-show="loading" class="state-card">
      กำลังโหลดข้อมูล...
    </div>

    <div x-show="!loading && !event" class="state-card">
      ไม่พบข้อมูลเหตุการณ์นี้
    </div>

    <div x-show="event && !loading">

      <div class="section-label">สรุปสถานะ</div>
      <div class="summary-row">

        <div class="summary-card">
          <div class="label">เป้าหมาย</div>
          <div class="value" x-text="event && event.targetCount"></div>
          <div class="sub-label">นาย</div>
        </div>

        <div class="summary-card success">
          <div class="label">ตอบรับแล้ว</div>
          <div class="value" x-text="event && event.officers.filter(o=>o.ack).length"></div>
          <div class="sub-label">นายที่ตอบรับ</div>
        </div>

        <div class="summary-card danger">
          <div class="label">ไม่ตอบรับ</div>
          <div class="value" x-text="event && (event.targetCount - event.officers.filter(o=>o.ack).length)"></div>
          <div class="sub-label">นายที่ยังไม่ตอบรับ</div>
        </div>

      </div>

      <div class="section-label">รายชื่อเจ้าหน้าที่</div>

      <div class="officer-table-card">

        <div class="officer-table-header">
          <span class="officer-table-title">
            เจ้าหน้าที่
            <span style="font-size:13px;font-weight:400;color:#64748b;margin-left:6px" 
                  x-text="event ? '(' + event.officers.length + ' นาย)' : ''">
            </span>
          </span>

          <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
            <input type="text" class="form-control" placeholder="ค้นหาชื่อเจ้าหน้าที่..." x-model="search" style="width:260px; border-radius:10px;">
            
            <div class="officer-filter-tabs">
              <button class="filter-tab" :class="filter === 'all' ? 'active' : ''" @click="filter = 'all'">ทั้งหมด</button>
              <button class="filter-tab" :class="filter === 'ack' ? 'active' : ''" @click="filter = 'ack'">ตอบรับ</button>
              <button class="filter-tab" :class="filter === 'noack' ? 'active' : ''" @click="filter = 'noack'">ไม่ตอบรับ</button>
            </div>
          </div>

          </div>

        <div class="officer-table-inner">
          <table>
            <thead>
              <tr>
                <th style="width:60px">#</th>
                <th>ชื่อ-สกุล</th>
                <th>เบอร์โทร</th>
                <th>เวลาตอบรับ</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(officer, index) in filteredOfficers()" :key="officer.id">
                <tr>
                  <td style="color:#94a3b8;font-size:12px" x-text="index + 1"></td>
                  <td>
                    <span style="font-weight:600" x-text="officer.name"></span>
                  </td>
                  <td style="color:#64748b;font-size:13px">
                    <span x-text="officer.phones && officer.phones.length ? officer.phones.join(', ') : '—'"></span>
                  </td>
                  <td style="color:#64748b;font-size:13px">
                    <span x-text="officer.ack && (officer.ackTime || officer.ackAt) ? formatDate(officer.ackTime || officer.ackAt) : '—'"></span>
                  </td>
                  <td>
                    <span class="status-pill" :class="officer.ack ? 'ack' : 'noack'" x-text="officer.ack ? '✔ ตอบรับแล้ว' : '✕ ไม่ตอบรับ'"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

      </div>

    </div>

    <div class="page-footer">
      Emergency Mobilization System &nbsp;·&nbsp; ข้อมูลอัปเดต Real-time
    </div>

  </div><script>
    function detailPage() {
      return {
        // ตัวแปรสำหรับจัดเก็บออบเจกต์ข้อมูลของเหตุการณ์นั้นๆ
        event: null,
        // ตัวแปรระบุสถานะกำลังโหลดข้อมูล (เริ่มต้นเป็นจริง)
        loading: true,
        // ตัวกรองสลับข้อมูลตาราง (ค่าเริ่มต้นคือทั้งหมด 'all')
        filter: 'all',
        // ตัวแปรผูกข้อมูลคำค้นหาที่กรอกในช่องค้นหา
        search: '',

        /**
         * ฟังก์ชันตรวจสอบ Query Parameter และดึงข้อมูลประวัติรายเหตุการณ์จาก API
         */
        async init() {
          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");

          if (!id) {
            this.loading = false;
            return;
          }

          try {
            const response = await fetch(`http://localhost:3000/mobilization/history/${id}`);
            if (!response.ok) throw new Error("not found");
            this.event = await response.json();
          } catch (e) {
            this.event = null;
          } finally {
            this.loading = false;
          }
        },

        /**
         * ฟังก์ชันกรองรายชื่อเจ้าหน้าที่ตามเงื่อนไข แท็บสถานะการตอบรับ และ คีย์เวิร์ดในช่องค้นหา
         */
        filteredOfficers() {
          if (!this.event) return [];
          let officers = this.event.officers;

          // กรองเอาเฉพาะผู้ที่ตอบรับแล้ว
          if (this.filter === 'ack') {
            officers = officers.filter(o => o.ack);
          }

          // กรองเอาเฉพาะผู้ที่ไม่ตอบรับ
          if (this.filter === 'noack') {
            officers = officers.filter(o => !o.ack);
          }

          // กรองข้อมูลด้วยการค้นหาตัวอักษรของชื่อ
          if (this.search.trim()) {
            officers = officers.filter(o =>
              o.name.toLowerCase().includes(this.search.toLowerCase())
            );
          }

          return officers;
        },

        /**
         * ฟังก์ชันแปลงรูปแบบค่าแสตมป์เวลาให้กลายเป็นวันและเวลาภาษาไทยท้องถิ่น
         */
        formatDate(timestamp) {
          return new Date(timestamp).toLocaleString("th-TH");
        }
      };
    }
  </script>

</body>
</html>
